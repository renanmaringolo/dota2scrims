services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dota2scrims}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-dota2scrims_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dota2scrims} -d ${POSTGRES_DB:-dota2scrims_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - dota2scrims_network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - dota2scrims_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-dota2scrims}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-dota2scrims_dev}
      REDIS_URL: redis://redis:6379/0
      RAILS_ENV: development
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY:-}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      SIDEKIQ_CONCURRENCY: 5
      ACTION_CABLE_URL: ws://localhost:3000/cable
      FRONTEND_URL: http://localhost:5173
      RAILS_LOG_TO_STDOUT: "true"
    volumes:
      - ./backend:/app
      - backend_gems:/usr/local/bundle
    tmpfs:
      - /app/tmp/pids
      - /app/tmp/cache
    command: bash -c "rm -f tmp/pids/server.pid && rails server -b 0.0.0.0 -p 3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/up || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - dota2scrims_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_URL: http://localhost:3000/api
      VITE_WS_URL: ws://localhost:3000/cable
      VITE_APP_NAME: Dota2Scrims
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: npm run dev -- --host 0.0.0.0
    networks:
      - dota2scrims_network

  sidekiq:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-dota2scrims}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-dota2scrims_dev}
      REDIS_URL: redis://redis:6379/0
      RAILS_ENV: development
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY:-}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      SIDEKIQ_CONCURRENCY: 5
      ACTION_CABLE_URL: ws://localhost:3000/cable
      FRONTEND_URL: http://localhost:5173
      RAILS_LOG_TO_STDOUT: "true"
    volumes:
      - ./backend:/app
      - backend_gems:/usr/local/bundle
    command: bundle exec sidekiq -C config/sidekiq.yml
    networks:
      - dota2scrims_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_gems:
    driver: local
  frontend_node_modules:
    driver: local

networks:
  dota2scrims_network:
    driver: bridge
